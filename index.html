<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFBrain Prototype</title>
    <!-- Tailwind CSS CDN (Lec 2) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">

    <!-- Header / Nav (Lec 1) -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-extrabold text-indigo-700">PDFBrain</h1>
            <nav class="hidden md:flex gap-6 text-gray-600 font-medium">
                <button id="chat-btn" class="text-indigo-600 border-b-2 border-indigo-600">צ'אט</button>
                 <button id="compare-btn" class="hover:text-indigo-600 transition">השוואת מאמרים</button>
                 <button id="history-btn" class="hover:text-indigo-600 transition">היסטוריה</button>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm text-gray-500">סטודנט להנדסת תוכנה</span>
            <div class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold">S</div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar - Document List (Lec 3 - Dynamic UI) -->
        <aside class="w-80 bg-white border-l border-gray-200 flex flex-col">
            <div class="p-4 border-b">
                <button class="w-full bg-indigo-600 text-white rounded-lg py-2 font-bold hover:bg-indigo-700 transition shadow-md">
                    + העלאת PDF חדש
                </button>
            </div>
            <div class="flex-1 overflow-y-auto" id="docs-list">
                <!-- Dynamic Content via JS -->
            </div>
        </aside>

        <!-- Chat Area -->
        <section class="flex-1 flex flex-col bg-slate-50">
            <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4">
                <!-- Dynamic Messages via JS -->
            </div>

            <!-- Message Input (Lec 2 - Events) -->
            <div class="p-4 bg-white border-t border-gray-200">
                <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
                    <input type="text" id="msg-input" 
                           class="flex-1 border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           placeholder="שאל שאלה על המאמר...">
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                        שלח
                    </button>
                </form>
            </div>
        </section>
    </main>

    <!-- Script Connection (Pure JS) -->
    <script src="script.js"></script>
</body>
</html>
